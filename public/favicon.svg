<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Deep Kashmir blue background with rounded corners -->
  <rect width="32" height="32" rx="6" fill="#1a3a6c"/>

  <!-- Second mountain (right, faded) -->
  <path d="M22 14 L29 27 L15 27" fill="none" stroke="white" stroke-width="1.2"
        stroke-linejoin="round" stroke-opacity="0.4"/>

  <!-- Main mountain peak -->
  <path d="M16 5 L28 27 L4 27 Z" fill="none" stroke="white" stroke-width="2"
        stroke-linejoin="round"/>

  <!-- Gold snow-cap diamond at peak -->
  <path d="M16 5 L19.5 12.5 L16 10.5 L12.5 12.5 Z" fill="#d4902e"/>

  <!-- Gold horizon line -->
  <line x1="2" y1="27" x2="30" y2="27" stroke="#d4902e" stroke-width="2"
        stroke-linecap="round"/>

  <!-- Star dot (top-left sky) -->
  <circle cx="6" cy="9" r="1" fill="white" opacity="0.45"/>
</svg>
